<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ressourcenplanung</title>
  <meta name="description" content="Wochenbasierte Ressourcen- und Aufgabenplanung für Teams." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header class="app-header">
    <div class="app-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
        <line x1="8" y1="14" x2="8" y2="18" />
        <line x1="12" y1="14" x2="12" y2="18" />
      </svg>
      Ressourcenplanung
    </div>

    <div class="week-nav">
      <button id="prevWeek" title="Vorherige Woche">&#8592;</button>
      <span class="week-label" id="weekLabel"></span>
      <button id="nextWeek" title="Nächste Woche">&#8594;</button>
      <span class="nav-sep"></span>
      <select class="form-control nav-month" id="monthPicker"></select>
      <button class="btn btn-today" id="btnToday">Heute</button>
      <button class="btn btn-today" id="btnToggleWeeks" title="1-/2-Wochen-Ansicht">1W</button>
    </div>

    <div class="header-nav">
      <a href="auswertung.html" class="btn" style="text-decoration:none">📊 Auswertung</a>
      <button class="btn" id="btnManageEmployees">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Mitarbeiter
      </button>
      <button class="btn" id="btnManageProjects">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2" />
          <polyline points="2 17 12 22 22 17" />
          <polyline points="2 12 12 17 22 12" />
        </svg>
        Projekte
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
  <main class="app-main">
    <div id="matrixContainer"></div>
  </main>

  <!-- ═══════════════════════ TASK MODAL ═══════════════════════ -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="taskModalTitle">Aufgabe hinzufügen</span>
        <button class="modal-close" data-close="taskModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Projekt</label>
          <select class="form-control" id="taskProject"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Von</label>
            <input type="date" class="form-control" id="taskStart" />
          </div>
          <div class="form-group">
            <label class="form-label">Bis</label>
            <input type="date" class="form-control" id="taskEnd" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Zeitbudget <span style="color:var(--text-muted);font-weight:400">(pro
              Tag)</span></label>
          <div class="budget-select">
            <div class="budget-option selected" data-val="0.5" id="budgetHalf">½ Tag</div>
            <div class="budget-option" data-val="1" id="budgetFull">1 Tag</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notiz <span
              style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <input type="text" class="form-control" id="taskNote" placeholder="z. B. inkl. Review" />
        </div>
      </div>
      <div class="modal-footer" id="taskModalFooter">
        <button class="btn btn-danger" id="btnDeleteTask" style="display:none;margin-right:auto">Löschen</button>
        <button class="btn" data-close="taskModal">Abbrechen</button>
        <button class="btn btn-primary" id="btnSaveTask">Speichern</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ EMPLOYEE MODAL ═══════════════════════ -->
  <div class="modal-overlay" id="employeeModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Mitarbeiter verwalten</span>
        <button class="modal-close" data-close="employeeModal">✕</button>
      </div>
      <div class="modal-body">
        <div id="employeeList"></div>
        <hr class="divider" />
        <p class="form-label">Neuen Mitarbeiter hinzufügen</p>
        <div class="form-row" style="margin-top:10px">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="newEmpName" placeholder="z. B. Anna Müller" />
          </div>
          <div class="form-group" style="max-width:120px">
            <label class="form-label">Wochenstunden</label>
            <input type="number" class="form-control" id="newEmpHours" value="40" min="1" max="60" />
          </div>
        </div>
        <button class="btn btn-primary" id="btnAddEmployee" style="width:100%">Mitarbeiter hinzufügen</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" data-close="employeeModal">Fertig</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ PROJECT MODAL ═══════════════════════ -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Projektpool verwalten</span>
        <button class="modal-close" data-close="projectModal">✕</button>
      </div>
      <div class="modal-body">
        <div id="projectList"></div>
        <hr class="divider" />
        <p class="form-label">Neues Projekt hinzufügen</p>
        <div style="margin-top:10px">
          <div class="form-group">
            <label class="form-label">Projektname</label>
            <input type="text" class="form-control" id="newProjName" placeholder="z. B. Website Relaunch" />
          </div>
          <div class="form-group">
            <label class="form-label">Farbe</label>
            <div class="color-swatches" id="colorSwatches"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Budget <span style="color:var(--text-muted);font-weight:400">(Tage,
                optional)</span></label>
            <input type="number" class="form-control" id="newProjBudget" placeholder="z. B. 20" min="0.5" step="0.5" />
          </div>
        </div>
        <button class="btn btn-primary" id="btnAddProject" style="width:100%">Projekt hinzufügen</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" data-close="projectModal">Fertig</button>
      </div>
    </div>
  </div>



  <!-- ═══════════════════ TOAST CONTAINER ═══════════════════════ -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>

</html>
